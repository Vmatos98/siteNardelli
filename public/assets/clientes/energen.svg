<svg width="400" height="120" viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ea580c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#334155;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Fundo transparente -->
  <rect width="400" height="120" fill="transparent" />
  
  <!-- Ícone geométrico abstrato (Representando engenharia / precisão) -->
  <g transform="translate(30, 30)">
    <polygon points="30,0 60,15 60,45 30,60 0,45 0,15" fill="url(#grad2)" />
    <polygon points="30,15 45,22.5 45,37.5 30,45 15,37.5 15,22.5" fill="url(#grad1)" />
    <circle cx="30" cy="30" r="5" fill="#ffffff" />
  </g>

  <!-- Texto com o nome da empresa -->
  <text x="110" y="65" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="22" font-weight="900" fill="#1e293b" letter-spacing="-0.5" dominant-baseline="middle">
    ENERGEN
  </text>

  <!-- Subtítulo / Linha decorativa -->
  <rect x="110" y="80" width="40" height="3" fill="#ea580c" rx="1.5" />
  <text x="160" y="83" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="10" font-weight="600" fill="#64748b" letter-spacing="1.5" dominant-baseline="middle">
    CLIENTE PARCEIRO
  </text>
</svg>